<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meteo</title>
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Leaflet Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Sfondo adattivo */
        body { 
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); 
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            /* Su mobile allineiamo in alto per gestire meglio la tastiera */
            align-items: flex-start; 
            padding: 1rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Centratura verticale solo su schermi grandi */
        @media (min-width: 768px) {
            body { align-items: center; }
        }

        .glass { 
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); /* Supporto Safari iOS */
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        #map { 
            height: 200px; 
            width: 100%; 
            border-radius: 1.5rem; 
            z-index: 5; 
            margin-top: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #suggestions {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: rgba(30, 41, 59, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            margin-top: 5px;
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .suggestion-item {
            padding: 15px 20px; /* Più grande per il tocco delle dita */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* Nasconde la scrollbar della mappa */
        .leaflet-control-attribution { font-size: 8px !important; }


        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .hourly-card {
            min-width: 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }


        /* Di base le frecce sono trasparenti e non cliccabili */
        .arrow-btn {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Quando passi il mouse sul contenitore, le frecce appaiono */
        #hourlyContainer:hover .arrow-btn {
            opacity: 1;
            pointer-events: auto;
        }

        /* Nascondi le frecce su mobile (touch) dove non serve l'hover */
        @media (max-width: 640px) {
            .arrow-btn { display: none !important; }
        }

    </style>
</head>
<body class="antialiased">

    <!-- Container Principale (Responsive Width) -->
    <div class="glass w-full max-w-md sm:max-w-lg rounded-[2.5rem] p-5 sm:p-8 text-white shadow-2xl">
        
        <!-- Search Bar -->
        <div class="relative mb-6">
            <div class="relative flex items-center">
                <input type="text" id="cityInput" placeholder="Cerca città..." 
                    autocomplete="off"
                    oninput="gestisciInput(this.value)"
                    class="w-full bg-white/10 border-none rounded-2xl py-4 px-6 pr-14 text-lg text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-inner">
                
                <button onclick="cercaMeteo()" class="absolute right-2 bg-indigo-500 text-white p-3 rounded-xl hover:bg-indigo-400 active:scale-90 transition-all">
                    <i data-lucide="search" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="suggestions" class="hidden"></div>
        </div>

        <div id="stato" class="text-center hidden py-4 opacity-70 italic">Caricamento in corso...</div>

        <!-- Area Risultato -->
        <div id="risultato" class="hidden">
            
            <!-- Header -->
            <div class="flex justify-between items-start mb-6">
                <div class="max-w-[70%]">
                    <h1 id="cityName" class="text-3xl sm:text-4xl font-extrabold truncate italic">---</h1>
                    <p id="country" class="text-indigo-300 text-xs sm:text-sm font-bold uppercase tracking-wider mt-1"></p>
                </div>
                <div class="text-right">
                    <div id="weatherIcon" class="flex justify-end drop-shadow-lg"></div>
                    <p id="condition" class="text-xs sm:text-sm font-medium text-white/70 mt-1 uppercase">---</p>
                </div>
            </div>

            <!-- Temperatura -->
            <div class="text-center my-6">
                <div class="text-8xl sm:text-9xl font-black tracking-tighter inline-block" id="temp">0°</div>
            </div>

            <!-- Sezione Previsioni Orarie -->
            <div id="hourlyContainer" class="mt-8 hidden">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-indigo-300 mb-4 ml-1">Previsioni prossime ore</h3>
                
                <div class="relative flex items-center">
                    <!-- Freccia sinistra -->
                    <button onclick="scrollHourly('left')" 
                        class="arrow-btn absolute left-0 z-50 bg-indigo-600 p-1.5 rounded-full shadow-xl border border-white/20 hover:bg-indigo-500">
                        <i data-lucide="chevron-left" class="w-5 h-5 text-white"></i>
                    </button>


                    <div id="hourlyList" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar scroll-smooth">
                        <!-- Card orarie caricate da JS -->
                    </div>

                    <!-- Freccia Destra -->
                    <button onclick="scrollHourly('right')" 
                        class="arrow-btn absolute right-0 z-50 bg-indigo-600 p-1.5 rounded-full shadow-xl border border-white/20 hover:bg-indigo-500">
                        <i data-lucide="chevron-right" class="w-5 h-5 text-white"></i>
                    </button>

                </div>
            </div>

            <!-- Griglia Info (Dettagli) -->
            <div class="grid grid-cols-2 gap-3 sm:gap-4 mb-2">
                <div class="bg-white/5 rounded-[1.5rem] p-4 flex flex-col items-start gap-2 border border-white/5">
                    <i data-lucide="thermometer" class="w-5 h-5 text-indigo-300"></i>
                    <div>
                        <p class="text-[9px] uppercase tracking-widest text-white/40">Percepita</p>
                        <p id="percepita" class="text-base font-bold">--°C</p>
                    </div>
                </div>
                <div class="bg-white/5 rounded-[1.5rem] p-4 flex flex-col items-start gap-2 border border-white/5">
                    <i data-lucide="droplets" class="w-5 h-5 text-blue-300"></i>
                    <div>
                        <p class="text-[9px] uppercase tracking-widest text-white/40">Umidità</p>
                        <p id="umidita" class="text-base font-bold">--%</p>
                    </div>
                </div>
                <div class="bg-white/5 rounded-[1.5rem] p-4 flex flex-col items-start gap-2 border border-white/5">
                    <i data-lucide="wind" class="w-5 h-5 text-emerald-300"></i>
                    <div>
                        <p class="text-[9px] uppercase tracking-widest text-white/40">Vento</p>
                        <p id="vento" class="text-base font-bold">-- km/h</p>
                    </div>
                </div>
                <div class="bg-white/5 rounded-[1.5rem] p-4 flex flex-col items-start gap-2 border border-white/5">
                    <i data-lucide="arrow-up-down" class="w-5 h-5 text-orange-300"></i>
                    <div>
                        <p class="text-[9px] uppercase tracking-widest text-white/40">Max / Min</p>
                        <p id="range" class="text-base font-bold">-- / --</p>
                    </div>
                </div>
            </div>

            <!-- Mappa -->
            <div id="map"></div>

            <div id="tipsContainer" class="mt-6 border-t border-white/10 pt-6 hidden">
                <h3 class="text-xs font-bold uppercase tracking-widest text-indigo-300 mb-4">Cosa fare oggi</h3>
                <div id="tipsList" class="space-y-3">
                    <!-- I suggerimenti verranno inseriti qui -->
                </div>
            </div>
        </div>
    </div>

    

    <script>
        lucide.createIcons();
        let map, marker, timeoutRicerca;

        async function gestisciInput(valore) {
            const suggDiv = document.getElementById('suggestions');
            if (valore.length < 2) { suggDiv.classList.add('hidden'); return; }

            clearTimeout(timeoutRicerca);
            timeoutRicerca = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/search/${encodeURIComponent(valore)}`);
                    const data = await response.json();
                    if (data.length > 0) {
                        suggDiv.innerHTML = data.map(city => `
                            <div class="suggestion-item active:bg-indigo-500/20" 
                                 onclick="selezionaCitta('${city.name.replace(/'/g, "\\'")}', ${city.lat}, ${city.lon}, '${city.admin.replace(/'/g, "\\'")}', '${city.country.replace(/'/g, "\\'")}')">
                                <div class="font-bold text-base">${city.name}</div>
                                <div class="text-[11px] opacity-50">${city.admin} (${city.country})</div>
                            </div>
                        `).join('');
                        suggDiv.classList.remove('hidden');
                    } else { suggDiv.classList.add('hidden'); }
                } catch (e) {}
            }, 300);
        }

        function selezionaCitta(nome, lat, lon, admin, country) {
            document.getElementById('cityInput').value = nome;
            document.getElementById('suggestions').classList.add('hidden');
            caricaMeteoDati(nome, lat, lon, admin, country);
            // Chiude la tastiera su mobile
            document.activeElement.blur();
        }

        async function caricaMeteoDati(nome, lat, lon, admin, country) {
            const resDiv = document.getElementById('risultato');
            const stato = document.getElementById('stato');
            stato.classList.remove('hidden');
            resDiv.classList.add('hidden');

            try {
                const response = await fetch(`/api/weather?lat=${lat}&lon=${lon}&name=${encodeURIComponent(nome)}&admin=${encodeURIComponent(admin)}&country=${encodeURIComponent(country)}`);
                const data = await response.json();

                if (response.ok) {
                    document.getElementById('cityName').innerText = data.citta;
                    document.getElementById('country').innerText = data.regione ? `${data.regione}, ${data.paese}` : data.paese;
                    document.getElementById('temp').innerText = `${data.temp}°`;
                    document.getElementById('condition').innerText = data.condizione;
                    document.getElementById('percepita').innerText = `${data.percepita}°C`;
                    document.getElementById('umidita').innerText = `${data.umidita}%`;
                    document.getElementById('vento').innerText = `${data.vento} km/h`;
                    document.getElementById('range').innerText = `${data.max}° / ${data.min}°`;
                    document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${data.icona}" class="w-14 h-14 text-indigo-300"></i>`;
                    const hourlyContainer = document.getElementById('hourlyContainer');
                    const hourlyList = document.getElementById('hourlyList');
                    
                    if (data.hourly && data.hourly.length > 0) {
                        hourlyList.innerHTML = data.hourly.map(h => `
                            <div class="hourly-card rounded-2xl p-3 flex flex-col items-center gap-2">
                                <span class="text-[10px] text-white/50 font-medium">${h.ora}</span>
                                <i data-lucide="${h.icona}" class="w-6 h-6 text-indigo-300"></i>
                                <span class="text-sm font-bold">${h.temp}°</span>
                            </div>
                        `).join('');
        
                        hourlyContainer.classList.remove('hidden');
                    }

                    stato.classList.add('hidden');
                    resDiv.classList.remove('hidden');
                    lucide.createIcons();
                    updateMap(data.lat, data.lon);

                    // Gestione Consigli
                    const tipsContainer = document.getElementById('tipsContainer');
                    const tipsList = document.getElementById('tipsList');

                    tipsList.innerHTML = ''
                    
                    if (data.tips && Array.isArray(data.tips)) {
                        // Cicliamo su ogni elemento dell'array 'tips'
                        tipsList.innerHTML = data.tips.map(tip => `
                            <div class="flex items-center gap-4 bg-white/5 p-3 rounded-2xl border border-white/5 hover:bg-white/10 transition-colors">
                                <div class="bg-indigo-500/20 p-2 rounded-lg">
                                    <i data-lucide="${tip.icon}" class="w-5 h-5 text-indigo-300"></i>
                                </div>
                                <p class="text-sm font-medium text-white/90 leading-tight">${tip.text}</p>
                            </div>
                        `).join('');
                        
                        tipsContainer.classList.remove('hidden');
                        lucide.createIcons();
                    }
                }
            } catch (err) { stato.innerText = "Errore di connessione"; }
        }

        async function cercaMeteo() {
            const query = document.getElementById('cityInput').value;
            if(!query) return;
            const response = await fetch(`/api/search/${encodeURIComponent(query)}`);
            const data = await response.json();
            if(data.length > 0) {
                const c = data[0];
                selezionaCitta(c.name, c.lat, c.lon, c.admin, c.country);
            }
        }

        function updateMap(lat, lon) {
            if (!map) {
                map = L.map('map', { zoomControl: false, dragging: !L.Browser.mobile, tap: !L.Browser.mobile }).setView([lat, lon], 12);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                marker = L.marker([lat, lon]).addTo(map);
            } else {
                map.setView([lat, lon], 12);
                marker.setLatLng([lat, lon]);
            }
            setTimeout(() => map.invalidateSize(), 500);
        }

        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') cercaMeteo();
        });

        // Chiudi suggerimenti se clicchi fuori
        document.addEventListener('click', (e) => {
            if (!document.getElementById('cityInput').contains(e.target)) {
                document.getElementById('suggestions').classList.add('hidden');
            }
        });


        function scrollHourly(direction) {
            const list = document.getElementById('hourlyList');
            // Calcoliamo quanto scorrere (es: la larghezza di 3 card)
            const scrollAmount = 250; 
            
            if (direction === 'left') {
                list.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            } else {
                list.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
