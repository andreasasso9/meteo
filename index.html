<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteo Pro & Map</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            min-height: 100vh; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        #map { 
            height: 180px; 
            width: 100%; 
            border-radius: 1.25rem; 
            z-index: 10; 
            margin-top: 1.5rem; 
        }
        /* Stile suggerimenti */
        #suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(30, 41, 59, 0.98);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            margin-top: 8px;
            z-index: 100; /* Molto alto per stare sopra la mappa */
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover {
            background: rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body class="p-4">

    <!-- Contenitore Principale -->
    <div class="glass w-full max-w-lg rounded-[2.5rem] p-6 text-white shadow-2xl relative">
        
        <!-- Search Bar -->
        <div class="relative mb-8">
            <div class="relative flex items-center">
                <input type="text" id="cityInput" placeholder="Cerca una località..." 
                    autocomplete="off"
                    oninput="gestisciInput(this.value)"
                    class="w-full bg-white/10 border-none rounded-2xl py-4 px-6 pr-14 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                
                <button onclick="cercaMeteo()" class="absolute right-2 bg-indigo-500 text-white p-2.5 rounded-xl hover:bg-indigo-400 transition-all">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Suggerimenti Autocomplete -->
            <div id="suggestions" class="hidden"></div>
        </div>

        <div id="stato" class="text-center hidden py-4 animate-pulse">Caricamento...</div>

        <!-- Area Risultato -->
        <div id="risultato" class="hidden">
            <!-- Header -->
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 id="cityName" class="text-3xl font-bold italic">---</h1>
                    <p id="country" class="text-indigo-300 text-xs uppercase tracking-widest font-bold"></p>
                </div>
                <div class="text-right">
                    <div id="weatherIcon" class="flex justify-end"></div>
                    <p id="condition" class="text-sm font-light text-white/80">---</p>
                </div>
            </div>

            <!-- Temperatura -->
            <div class="text-center mb-8">
                <div class="text-8xl font-black inline-block tracking-tighter" id="temp">0°</div>
            </div>

            <!-- Griglia 2x2 -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/5 rounded-2xl p-4 flex items-center gap-4 border border-white/5">
                    <i data-lucide="thermometer" class="w-5 h-5 text-indigo-300"></i>
                    <div>
                        <p class="text-[10px] uppercase text-white/40">Percepita</p>
                        <p id="percepita" class="font-bold">--°C</p>
                    </div>
                </div>
                <div class="bg-white/5 rounded-2xl p-4 flex items-center gap-4 border border-white/5">
                    <i data-lucide="droplets" class="w-5 h-5 text-blue-300"></i>
                    <div>
                        <p class="text-[10px] uppercase text-white/40">Umidità</p>
                        <p id="umidita" class="font-bold">--%</p>
                    </div>
                </div>
                <div class="bg-white/5 rounded-2xl p-4 flex items-center gap-4 border border-white/5">
                    <i data-lucide="wind" class="w-5 h-5 text-emerald-300"></i>
                    <div>
                        <p class="text-[10px] uppercase text-white/40">Vento</p>
                        <p id="vento" class="font-bold">-- km/h</p>
                    </div>
                </div>
                <div class="bg-white/5 rounded-2xl p-4 flex items-center gap-4 border border-white/5">
                    <i data-lucide="arrow-up-down" class="w-5 h-5 text-orange-300"></i>
                    <div>
                        <p class="text-[10px] uppercase text-white/40">Max / Min</p>
                        <p id="range" class="font-bold">-- / --</p>
                    </div>
                </div>
            </div>

            <!-- Mappa -->
            <div id="map"></div>
        </div>
    </div>

<script>
    lucide.createIcons();
    let map, marker, timeoutRicerca;

    async function gestisciInput(valore) {
        const suggDiv = document.getElementById('suggestions');
        if (valore.length < 2) { suggDiv.classList.add('hidden'); return; }

        clearTimeout(timeoutRicerca);
        timeoutRicerca = setTimeout(async () => {
            const response = await fetch(`/api/search/${valore}`);
            const data = await response.json();
            if (data.length > 0) {
                // Passiamo nome, lat e lon alla funzione selezionaCitta
                suggDiv.innerHTML = data.map(city => `
                    <div class="suggestion-item" onclick="selezionaCitta('${city.name.replace(/'/g, "\\'")}', ${city.lat}, ${city.lon}, '${city.admin.replace(/'/g, "\\'")}', '${city.country.replace(/'/g, "\\ text-sm")}')">
                        <div class="font-bold">${city.name}</div>
                        <div class="text-[10px] opacity-60">${city.admin} (${city.country})</div>
                    </div>
                `).join('');
                suggDiv.classList.remove('hidden');
            } else { suggDiv.classList.add('hidden'); }
        }, 300);
    }

    // QUESTA FUNZIONE ORA USA LE COORDINATE ESATTE
    function selezionaCitta(nome, lat, lon, admin, country) {
        document.getElementById('cityInput').value = nome;
        document.getElementById('suggestions').classList.add('hidden');
        caricaMeteoDati(nome, lat, lon, admin, country);
    }

    async function caricaMeteoDati(nome, lat, lon, admin, country) {
        const resDiv = document.getElementById('risultato');
        const stato = document.getElementById('stato');
        
        stato.classList.remove('hidden');
        resDiv.classList.add('hidden');

        try {
            // Chiamata al backend usando Lat e Lon
            const response = await fetch(`/api/weather?lat=${lat}&lon=${lon}&name=${nome}&admin=${admin}&country=${country}`);
            const data = await response.json();

            if (response.ok) {
                document.getElementById('cityName').innerText = data.citta;
                document.getElementById('temp').innerText = `${data.temp}°`;
                document.getElementById('condition').innerText = data.condizione;
                document.getElementById('percepita').innerText = `${data.percepita}°C`;
                document.getElementById('umidita').innerText = `${data.umidita}%`;
                document.getElementById('vento').innerText = `${data.vento} km/h`;
                document.getElementById('range').innerText = `${data.max}° / ${data.min}°`;
                document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${data.icona}" class="w-12 h-12 text-indigo-400"></i>`;
                
                const infoLocalita = data.regione ? `${data.regione}, ${data.paese}` : data.paese;
                document.getElementById('country').innerText = infoLocalita;

                stato.classList.add('hidden');
                resDiv.classList.remove('hidden');
                lucide.createIcons();
                updateMap(data.lat, data.lon);
            }
        } catch (err) {
            stato.innerText = "Errore nel caricamento";
        }
    }

    // Gestione tasto INVIO manuale (prende il primo risultato disponibile)
    async function cercaMeteo() {
        const query = document.getElementById('cityInput').value;
        if(!query) return;
        
        // Se l'utente preme invio senza cliccare, cerchiamo il primo match
        const response = await fetch(`/api/search/${query}`);
        const data = await response.json();
        if(data.length > 0) {
            selezionaCitta(data[0].name, data[0].lat, data[0].lon);
        } else {
            alert("Città non trovata");
        }
    }

    function updateMap(lat, lon) {
        if (!map) {
            map = L.map('map', { zoomControl: false }).setView([lat, lon], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            marker = L.marker([lat, lon]).addTo(map);
        } else {
            map.setView([lat, lon], 12);
            marker.setLatLng([lat, lon]);
        }
        setTimeout(() => map.invalidateSize(), 400);
    }
</script>
</body>
</html>
